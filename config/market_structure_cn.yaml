market_structure:
  market: "CN"
  market_scope: "cn_cash_equities_and_northbound"
  benchmark_symbol: "510300.SS"
  research_only: true
  strategy_bias: "slow_frequency_etf_and_large_cap_only"
  costs:
    broker_commission_bps: 8.0
    notes:
      - "This proxy is intentionally conservative while CN remains research-only in the current project."
  order_rules:
    buy_lot_multiple: 100
    day_turnaround_allowed: false
    odd_lot_auto_match: false
    odd_lot_discount_risk: true
    price_limit_pct: 10.0
