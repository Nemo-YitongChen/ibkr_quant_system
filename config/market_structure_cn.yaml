      - "Northbound buy orders should be treated as 100-share board lots, and same-day turnaround trading is not allowed."
  account_rules:
    standard_settlement_cycle: "T+1"
    pdt_margin_equity_min: 0.0
    prefer_etf_only_below_equity: 0.0
    small_account_equity_label: ""
  portfolio_preferences:
    preferred_instruments: ["ETF", "LARGE_CAP"]
    small_account_preferred_asset_classes: ["etf"]
    recommended_signal_frequency: "daily"
    recommended_rebalance_frequency: "weekly"
    max_rebalances_per_week: 1
  notes:
    - "CN currently stays research-only in this project, so market_structure is advisory until the execution chain is formally enabled."
