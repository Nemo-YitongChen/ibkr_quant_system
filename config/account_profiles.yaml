account_profiles:
  default_profile: medium
  profiles:
    - name: small
      label: 小资金
      min_equity: 0
      max_equity: 25000
      summary: 1000-25000 AUD 小账户先用可整股交易的高流动性低价 ETF 验证 paper 下单闭环，禁止靠杠杆放大风险。
      preferred_instruments:
        - ETF
        - Large Cap
      execution:
        min_cash_buffer_pct: 0.10
        cash_buffer_floor: 100
        min_trade_value: 25
        max_order_value_pct: 0.10
        max_orders_per_run: 1
        account_allocation_pct: 0.25
        allow_whole_share_preferred_buy_override: true
        whole_share_preferred_min_edge_margin_bps: 0.0
        prioritize_buy_orders_for_growth_submit: true
        allow_fractional_qty: false
        fractional_qty_decimals: 4
        manual_review_enabled: true
        manual_review_order_value_pct: 0.12
        order_type: "LMT"
      watchlist_expansion:
        max_symbols_per_market: 10
        min_score: 0.55
        min_data_quality_score: 0.75
        min_liquidity_score: 0.65
        max_expected_cost_bps: 35.0
        min_expected_edge_bps: 20.0
        min_whole_share_edge_margin_bps: 2.0
        max_last_close_pct_of_equity: 0.10
        require_execution_ready: true
        require_whole_share_tradability: true
        allowed_actions:
          - ACCUMULATE
          - HOLD
        preferred_asset_classes:
          - etf
      notes:
        - 适合低频、低换手、先验证 paper 下单/fill/slippage/post-cost edge。
        - 小资金优先用 last_close 不高于单笔上限的整股 ETF，避免 IBKR API fractional order 拒单，不使用 margin、options、futures、CFD。
        - 自动 paper submit 阶段每轮最多 1 笔，每笔约 25-100 AUD 等值；先验证单笔 fill/slippage/post-cost edge，再考虑增加频率或组合数。
    - name: medium
      label: 中等资金
      min_equity: 25000
      max_equity: 150000
      summary: ETF + 高流动性大盘股并行，允许更均衡的组合展开。
      preferred_instruments:
        - ETF
        - Large Cap
      execution:
        min_trade_value: 1500
        max_order_value_pct: 0.08
        max_orders_per_run: 8
        account_allocation_pct: 0.35
      watchlist_expansion:
        max_symbols_per_market: 25
        min_score: 0.52
        min_data_quality_score: 0.72
        min_liquidity_score: 0.60
        max_expected_cost_bps: 38.0
        min_expected_edge_bps: 6.0
        min_whole_share_edge_margin_bps: 4.0
        max_last_close_pct_of_equity: 0.08
        require_execution_ready: true
        require_whole_share_tradability: true
        allowed_actions:
          - ACCUMULATE
          - HOLD
        preferred_asset_classes:
          - etf
          - equity
      notes:
        - 适合 ETF baseline 扩展到高流动性股票。
    - name: large
      label: 大资金
      min_equity: 150000
      summary: 允许更分散的 basket，但单笔占比继续保守。
      preferred_instruments:
        - ETF
        - Large Cap Basket
      execution:
        min_trade_value: 2500
        max_order_value_pct: 0.05
        max_orders_per_run: 12
        account_allocation_pct: 0.45
      watchlist_expansion:
        max_symbols_per_market: 40
        min_score: 0.50
        min_data_quality_score: 0.70
        min_liquidity_score: 0.55
        max_expected_cost_bps: 40.0
        min_expected_edge_bps: 5.0
        min_whole_share_edge_margin_bps: 3.0
        max_last_close_pct_of_equity: 0.05
        require_execution_ready: true
        require_whole_share_tradability: true
        allowed_actions:
          - ACCUMULATE
          - HOLD
        preferred_asset_classes:
          - etf
          - equity
      notes:
        - 更适合分批执行和容量约束。
