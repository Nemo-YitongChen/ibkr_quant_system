execution:
  account_equity_cap: 1000.0
  min_cash_buffer_pct: 0.05
  cash_buffer_floor: 1000.0
  min_trade_value: 500.0
  max_order_value_pct: 0.08
  weight_tolerance: 0.015
  max_orders_per_run: 8
  lot_size: 1
  lot_size_file: ""
  order_type: "MKT"
  limit_price_buffer_bps: 12.0
  wait_fill_sec: 20.0
  poll_interval_sec: 1.0
  allow_buys: true
  allow_sells: true
  near_entry_paper_test_enabled: true
  near_entry_paper_test_max_gap_pct: 0.30
  near_entry_paper_test_max_order_value: 100.0
  near_entry_paper_test_asset_classes:
    - etf
  near_entry_paper_test_limit_buffer_bps: 0.0
  whole_share_missing_opportunity_paper_sample_enabled: true
  whole_share_missing_opportunity_paper_sample_max_order_value: 100.0
  whole_share_missing_opportunity_paper_sample_asset_classes:
    - etf
  whole_share_missing_opportunity_paper_sample_limit_buffer_bps: 0.0
  account_allocation_pct: 0.30
  min_model_recommendation_score: 0.15
  min_execution_score: 0.05
  require_execution_ready: true
  manual_review_enabled: true
  manual_review_order_value_pct: 0.10
  shadow_ml_review_enabled: true
  shadow_ml_min_score_auto_submit: 0.00
  shadow_ml_min_positive_prob_auto_submit: 0.50
  shadow_ml_min_training_samples: 80
  shadow_ml_allow_whole_share_paper_sample: true
  shadow_ml_paper_sample_min_positive_prob: 0.55
  shadow_ml_paper_sample_min_edge_margin_bps: 0.0
  adv_max_participation_pct: 0.05
  adv_split_trigger_pct: 0.02
  max_slices_per_symbol: 4
  split_order_pause_sec: 2.0
  prefer_limit_orders_for_sliced_execution: true
  open_session_participation_scale: 0.70
  midday_session_participation_scale: 1.00
  close_session_participation_scale: 0.85
  open_session_limit_buffer_scale: 1.25
  midday_session_limit_buffer_scale: 0.85
  close_session_limit_buffer_scale: 1.10
  allow_min_lot_buy_override: false
  min_lot_buy_override_value_pct: 0.0
