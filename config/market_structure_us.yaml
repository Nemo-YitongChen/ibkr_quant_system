market_structure:
  market: "US"
  market_scope: "us_cash_equities"
  benchmark_symbol: "SPY"
  research_only: false
  strategy_bias: "mid_frequency_trend_and_relative_strength"
  costs:
    broker_commission_bps: 1.0
    notes:
      - "This proxy only covers broker and spread/slippage assumptions, not exchange-specific rebates."
  order_rules:
    buy_lot_multiple: 1
    day_turnaround_allowed: true
    odd_lot_auto_match: true
    odd_lot_discount_risk: false
    price_limit_pct: 0.0
  account_rules:
    standard_settlement_cycle: "T+1"
    pdt_margin_equity_min: 25000.0
    prefer_etf_only_below_equity: 25000.0
    small_account_equity_label: "below_pdt_threshold"
    notes:
      - "Below the PDT threshold, prefer overnight or swing-style trading and avoid margin day-trading workflows."
  portfolio_preferences:
    preferred_instruments: ["ETF", "LARGE_CAP"]
    small_account_preferred_asset_classes: ["etf"]
    recommended_signal_frequency: "daily"
    recommended_rebalance_frequency: "weekly"
    max_rebalances_per_week: 2
  notes:
    - "US equity support should prioritize ETF rotation and large-cap baskets before adding more complex short or intraday logic."
