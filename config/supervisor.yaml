timezone: "Australia/Sydney"
poll_sec: 30
max_consecutive_cycle_errors_before_shutdown: 3
market_holidays_config: "config/market_holidays.yaml"
summary_out_dir: "reports_supervisor"
scope_summary_out_dir: true
report_max_age_hours: 168
report_max_trading_days_old: 1
watchlist_timeout_sec: 180
report_timeout_sec: 1200
paper_timeout_sec: 300
execution_timeout_sec: 300
guard_timeout_sec: 240
short_safety_timeout_sec: 300
ibkr_task_min_gap_sec: 2.0
ibkr_budget_live_refresh_interval_sec: 1.0
ibkr_gateway_budget_artifact_refresh_interval_min: 5
ibkr_client_id_retry_span: 1
ibkr_connect_max_rounds: 3
ibkr_gateway_budgets:
  enabled: true
  default_weekly_gateway_request_budget: 1500
  stale_telemetry_warning_hours: 72
  over_budget_degraded_ratio: 1.5
  missing_telemetry_status: "warning"
  execution_reserve_ratio: 0.15
  protective_reserve_ratio: 0.40
  minimum_execution_reserve_requests: 50
  research_daily_burst_ratio: 1.0
  short_window_minutes: 10
  short_window_request_limit: 50
  short_window_execution_reserve: 10
  suppress_research_when_throttled: true
  suppress_opportunity_when_degraded: true
  suppress_opportunity_statuses: ["degraded"]
  suppress_broker_snapshot_when_degraded: true
  suppress_broker_snapshot_statuses: ["degraded"]
  markets:
    US:
      weekly_gateway_request_budget: 2000
    HK:
      weekly_gateway_request_budget: 1500
    ASX:
      weekly_gateway_request_budget: 1000
    XETRA:
      weekly_gateway_request_budget: 800
    CN:
      weekly_gateway_request_budget: 500
auto_order_readiness:
  enabled: true
  allow_live_submit: false
  excluded_markets: ["CN"]
  max_artifact_age_hours: 24
  max_preflight_age_hours: 24
  max_weekly_review_age_hours: 168
  local_dependency_refresh_enabled: true
  preflight_refresh_interval_min: 360
  market_readiness_refresh_interval_min: 15
  dependency_refresh_retry_interval_min: 10
  dependency_refresh_timeout_sec: 60
  execution_evidence_maintenance_enabled: true
  execution_evidence_maintenance_interval_min: 60
  execution_evidence_maintenance_max_targets_per_cycle: 1
  execution_evidence_maintenance_only_when_all_markets_closed: true
  block_on_preflight_fail: true
  block_on_stale_preflight: true
  block_on_stale_weekly_review: true
  block_on_gateway_budget_degraded: true
  block_on_supervisor_code_revision_mismatch: true
  block_on_missing_market_readiness: false
  block_on_market_readiness_not_ready: true
  warn_on_missing_market_readiness: true
  max_submit_portfolios_per_run: 4
  max_submit_portfolios_per_market: 1
  max_submit_orders_per_portfolio: 1
  max_submit_gross_order_value: 100.0
  max_submit_total_gross_order_value: 400.0
  evidence_scaled_submit_enabled: true
  baseline_submit_portfolios_per_run: 1
  baseline_submit_total_gross_order_value: 100.0
  trial_submit_portfolios_per_run: 2
  trial_submit_total_gross_order_value: 200.0
  scale_min_filled_orders: 5
  scale_min_matured_edge_samples: 5
  scale_min_realized_edge_bps: 0.0
  scale_max_abs_slippage_bps: 15.0
  scale_max_error_rate: 0.05
  full_scale_min_filled_orders: 20
  full_scale_min_matured_edge_samples: 15
  full_scale_min_realized_edge_bps: 5.0
  full_scale_max_abs_slippage_bps: 10.0
  full_scale_max_error_rate: 0.02
  full_scale_min_evidence_markets: 2
  market_evidence_min_filled_orders: 1
  market_evidence_min_matured_edge_samples: 1
  max_submit_unevidenced_markets_per_run: 1
  require_buy_order_for_submit: true
  block_on_submit_quality_not_pass: true
  min_submit_net_edge_bps: 8.0
  min_submit_edge_margin_bps: 3.0
  max_submit_expected_cost_bps: 35.0
  require_limit_order_for_submit: true
  max_submit_order_adv_pct: 0.001
  high_quality_min_net_edge_bps: 16.0
  high_quality_min_edge_margin_bps: 8.0
  high_quality_max_expected_cost_bps: 25.0
