name: xetra_market_core
asset_class: equity
region: xetra
symbol_master_db: "symbol_master.db"
seed_symbols: []
seed_watchlist_yaml: "config/watchlists/xetra_top_quality.yaml"
report_watchlist_yaml: "config/watchlists/xetra_top_quality.yaml"
symbol_master_watchlists:
  - "config/watchlists/xetra_market_core.yaml"
notes:
  - "Default XETRA equity universe for investment report and paper execution."
  - "Symbol master is expanded by a broader XETRA market-core watchlist for layered scan stage-1 coverage."
  - "Uses a curated liquid large-cap quality list while the broader symbol master is still optional."
layered_scan:
  enabled: true
  include_symbol_master: true
  include_recent: false
  include_scanner: true
  broad_limit: 120
  deep_limit: 32
  enrichment_limit: 16
  history_workers: 4
  network_reserve_ratio: 0.45
  progress_interval: 10
  scanner_limit: 20
