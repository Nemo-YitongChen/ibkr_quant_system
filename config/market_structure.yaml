market_structure:
  market_scope: "global_default"
  benchmark_symbol: ""
  research_only: false
  strategy_bias: "mid_frequency_adaptive_relative_strength"
  costs:
    broker_commission_bps: 3.0
    stamp_duty_bps_per_side: 0.0
    trading_fee_bps_per_side: 0.0
    sfc_levy_bps_per_side: 0.0
    afrc_levy_bps_per_side: 0.0
    settlement_fee_bps_per_side: 0.0
    notes:
      - "Default cost proxy is only a placeholder for markets without an explicit override."
  order_rules:
    buy_lot_multiple: 1
    day_turnaround_allowed: true
    odd_lot_auto_match: true
    odd_lot_discount_risk: false
    price_limit_pct: 0.0
  account_rules:
    standard_settlement_cycle: ""
    pdt_margin_equity_min: 0.0
    prefer_etf_only_below_equity: 0.0
    small_account_equity_label: ""
  portfolio_preferences:
    preferred_instruments: ["ETF", "LARGE_CAP"]
    small_account_preferred_asset_classes: ["etf"]
    recommended_signal_frequency: "daily"
    recommended_rebalance_frequency: "weekly"
    max_rebalances_per_week: 1
  notes:
    - "Use the per-market override before treating these defaults as actionable trading rules."
